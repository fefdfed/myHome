<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>常用网站导航</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000;
      overflow-x: hidden;
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    }

    /* ── Video ── */
    .video-wrapper {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #000;
    }

    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translateY(17%);
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* ── Liquid Glass ── */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0)    40%,
        rgba(255,255,255,0)    60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── Page Shell ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      padding: 24px;
      position: relative;
      z-index: 20;
    }

    .nav-inner {
      border-radius: 9999px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 64rem;
      margin: 0 auto;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .nav-logo-text {
      font-size: 1.125rem;
      font-weight: 600;
      color: #fff;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-date {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    .nav-btn {
      border-radius: 9999px;
      padding: 8px 24px;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 48px;
      text-align: center;
      transform: translateY(-4%);
    }

    .hero-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .hero-subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 0.75rem;
      margin-bottom: 40px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* ── Cards Grid ── */
    .grid-wrap {
      width: 100%;
      max-width: 72rem;
      margin: 0 auto;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 580px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .card {
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 26px 16px;
      text-decoration: none;
      color: rgba(255,255,255,0.75);
      transition: color 0.22s, transform 0.22s;
    }

    .card:hover {
      color: #fff;
      transform: translateY(-4px);
    }

    .card:hover .card-icon {
      background: rgba(255,255,255,0.14);
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: background 0.22s;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 0.875rem;
      letter-spacing: 0.3px;
      font-weight: 400;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 24px 0 40px;
    }

    .social-btn {
      border-radius: 9999px;
      padding: 14px;
      color: rgba(255,255,255,0.65);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.22s;
    }

    .social-btn:hover { color: #fff; }
    .social-btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body>

  <!-- Background Video -->
  <div class="video-wrapper">
    <video id="bg-video" muted autoplay playsinline preload="auto" style="opacity:0">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

  <!-- Page -->
  <div class="page">

    <nav>

            <line x1="2" y1="12" x2="22" y2="12"/>

          <span class="nav-date" id="current-date"></span>
          <a href="#" class="nav-btn liquid-glass">工作台</a>

    <!-- Hero + Cards -->
    <main class="hero">

      <div class="grid-wrap">

          <a class="card liquid-glass" href="http://jira.sanguosha.com:8080/secure/Dashboard.jspa" target="_blank" rel="noopener">

          <a class="card liquid-glass" href="https://aicoding.dobest.com/employee/usage" target="_blank" rel="noopener">

        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <button class="social-btn liquid-glass" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>

      <button class="social-btn liquid-glass" aria-label="Twitter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>

      <button class="social-btn liquid-glass" aria-label="Website">

          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>

  </div>

  <script>
    // ── Date ──
    document.getElementById('current-date').textContent =
      new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

    // ── Video fade system (requestAnimationFrame, no CSS transitions) ──
    const video = document.getElementById('bg-video');
    let fadingOutRef = false;
    let currentAnimFrame = null;

    function cancelFade() {
      if (currentAnimFrame !== null) {
        cancelAnimationFrame(currentAnimFrame);
        currentAnimFrame = null;
      }
    }

    function fadeTo(target, duration, onComplete) {
      cancelFade();
      const start = parseFloat(video.style.opacity) || 0;
      const t0 = performance.now();

      function step(now) {
        const p = Math.min((now - t0) / duration, 1);
        video.style.opacity = start + (target - start) * p;
        if (p < 1) {
          currentAnimFrame = requestAnimationFrame(step);
        } else {
          currentAnimFrame = null;
          onComplete && onComplete();
        }
      }

      currentAnimFrame = requestAnimationFrame(step);
    }

    function fadeIn()  { fadingOutRef = false; fadeTo(1, 500); }
    function fadeOut(cb) { fadingOutRef = true; fadeTo(0, 500, cb); }

    function restartVideo() {
      video.style.opacity = '0';
      fadingOutRef = false;
      setTimeout(() => {
        video.currentTime = 0;
        video.play().then(fadeIn).catch(() => {});
      }, 100);
    }

    video.addEventListener('canplay', () => {
      if (parseFloat(video.style.opacity) < 0.05) fadeIn();
    });

    video.addEventListener('timeupdate', () => {
      if (!fadingOutRef && video.duration && (video.duration - video.currentTime) <= 0.55) {
        fadeOut(restartVideo);
      }
    });

    video.addEventListener('ended', restartVideo);

    video.play().catch(() => {});
  </script>

</body>
</html>
